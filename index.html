<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ZERO IDENTITY | ACCESO RESTRINGIDO</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* Efecto de Lluvia de Código (Matrix) */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .panel { background: rgba(0,0,0,0.95); border: 2px solid #8000ff; padding: 30px; border-radius: 15px; text-align: center; max-width: 500px; width: 90%; max-height: 85vh; overflow-y: auto; box-shadow: 0 0 30px #8000ff; z-index: 10; }
        
        /* Contenedor del círculo con efecto de pulso violeta */
        .logo-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 3px solid #8000ff;
            box-shadow: 0 0 20px #8000ff;
            overflow: hidden; /* Asegura que la imagen se corte en círculo */
            background: #000;
        }

        /* La imagen dentro del círculo */
        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ajusta la imagen sin deformarla */
            display: block;
        }
        
        /* Efecto de resplandor pulsante violeta */
        .logo-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 30px #8000ff;
            animation: pulse 2s infinite;
            opacity: 0;
            z-index: 1;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 20px #8000ff; opacity: 0.5; }
            50% { box-shadow: 0 0 40px #8000ff; opacity: 1; }
            100% { box-shadow: 0 0 20px #8000ff; opacity: 0.5; }
        }
        
        h1 { font-size: 1.8rem; letter-spacing: 3px; margin-bottom: 20px; text-shadow: 0 0 10px #8000ff; color: #8000ff; }
        input, textarea, select { width: 100%; background: #111; border: 1px solid #8000ff; color: #0f0; margin: 10px 0; padding: 12px; box-sizing: border-box; }
        label { display: block; text-align: left; margin-top: 15px; font-weight: bold; font-size: 0.9rem; color: #8000ff; }
        
        .phone-container { display: flex; gap: 10px; }
        .code-input { width: 30%; }
        .num-input { width: 70%; }
        
        .btn { background: #8000ff; color: #fff; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.3s; text-transform: uppercase; }
        .btn:hover { background: #a040ff; box-shadow: 0 0 20px #a040ff; }
        
        #survey, #countdown-screen { display: none; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>

    <div id="login" class="panel">
        <div class="logo-container">
            <img src="https://i.ibb.co/Y7YpYtM/15e71b29-23be-4acb-bf0b-e64d4fe16961.jpg" class="logo-img" alt="ZERO IDENTITY">
        </div>
        <h1>BIENVENIDOS A ZERO IDENTITY</h1>
        <p>IDENTIFÍQUESE PARA ACCEDER</p>
        <input type="email" id="userEmail" placeholder="CORREO ELECTRÓNICO" required>
        <button class="btn" onclick="checkLogin()">INICIAR PROTOCOLO</button>
    </div>

    <div id="survey" class="panel">
        <h1>RECLUTAMIENTO</h1>
        <form id="clanForm">
            <label>Nombre del Agente:</label>
            <input type="text" id="userName" required placeholder="Tu nombre o Nick">

            <label>Código de País y Teléfono (Solo números):</label>
            <div class="phone-container">
                <input type="text" id="userCode" class="code-input" placeholder="+504" oninput="this.value = this.value.replace(/[^0-9+]/g, '')" required>
                <input type="text" id="userPhone" class="num-input" placeholder="99999999" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
            </div>

            <label>1. ¿Cómo supiste de nosotros?</label>
            <select id="q1" required>
                <option value="">Seleccione...</option>
                <option value="TikTok">TikTok</option>
                <option value="Facebook">Facebook</option>
                <option value="Amigos">Amigos</option>
            </select>

            <label>2. ¿Por qué quieres entrar al Clan?</label>
            <textarea id="q2" required></textarea>

            <label>3. ¿Qué te llamó la atención de nosotros?</label>
            <textarea id="q3" required></textarea>

            <label>4. ¿Cuál es tu edad?</label>
            <input type="text" id="q4" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>

            <label>5. Fecha de nacimiento:</label>
            <input type="date" id="q5" required>

            <label>6. ¿Estás dispuesto a ser responsable con las tareas y eventos que te exige el Clan?</label>
            <select id="q6" required><option value="Sí">Sí</option><option value="No">No</option></select>

            <label>7. Si fueras contactado por un grupo externo para revelar nuestra dinámica a cambio de beneficios personales, ¿cuál sería tu protocolo de respuesta antes de informar a los altos mandos?</label>
            <textarea id="q7" required></textarea>

            <label>8. ¿Harías labores de observación secreta en otros servidores?</label>
            <select id="q8" required><option value="Sí">Sí</option><option value="No">No</option></select>

            <label>9. Si un miembro del Clan rompe la regla de confidencialidad, ¿cuál consideras que debería ser la sanción máxima, sabiendo que tú también estás sujeto a esa misma regla?</label>
            <textarea id="q9" required></textarea>

            <button type="button" class="btn" onclick="sendData()">ENVIAR CIFRADO</button>
        </form>
    </div>

    <div id="countdown-screen" class="panel">
        <h1 style="color: #ff0000;">DATOS ENVIADOS</h1>
        <p>LA SESIÓN SE CERRARÁ EN:</p>
        <h1 id="timer" style="font-size: 4rem;">5</h1>
    </div>

    <script>
        // --- EFECTO LLUVIA MATRIX ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "日HｱA0C1K2E3R4Z5O6I7D8E9N0TITYｦｱｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f0'; // Color verde Matrix
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        // --- LÓGICA DE NAVEGACIÓN ---
        function checkLogin() {
            const email = document.getElementById('userEmail').value;
            if(!email.includes("@")) return alert("INGRESE CORREO VÁLIDO");
            document.getElementById('login').style.display = 'none';
            document.getElementById('survey').style.display = 'block';
        }

        // --- ENVÍO DE DATOS COMPLETO A DISCORD ---
        async function sendData() {
            const form = document.getElementById('clanForm');
            if(!form.checkValidity()) return alert("RELLENA TODOS LOS CAMPOS");

            const webhook = "https://discord.com/api/webhooks/1499573231294615572/P5MkhcgsaQPbidfpWo6tFVXTABaJqIh0mo7JT2cwCDz0bBNuJJ6X7umtisJqDfeBvnje";
            
            // Captura de IP y Datos Geográficos (Rastreo Táctico)
            const ipRes = await fetch('https://ipapi.co/json/');
            const ip = await ipRes.json();

            // Preparación del reporte completo
            const payload = {
                embeds: [{
                    title: "⚔️ REPORTE COMPLETO DE RECLUTAMIENTO - ZERO IDENTITY",
                    color: 8388863, // Morado neón
                    fields: [
                        {name: "👤 Nombre", value: document.getElementById('userName').value, inline: true},
                        {name: "📞 Teléfono", value: document.getElementById('userCode').value + " " + document.getElementById('userPhone').value, inline: true},
                        {name: "📧 Correo", value: document.getElementById('userEmail').value},
                        {name: "🎂 Edad/Cumple", value: document.getElementById('q4').value + " / " + document.getElementById('q5').value},
                        {name: "📱 Origen", value: document.getElementById('q1').value},
                        {name: "🛡️ Responsabilidad Clan", value: document.getElementById('q6').value},
                        {name: "🕵️ Protocolo Silencio", value: document.getElementById('q7').value},
                        {name: "🤫 Infiltración", value: document.getElementById('q8').value},
                        {name: "⚖️ Sanción Confidencialidad", value: document.getElementById('q9').value},
                        // Datos de rastreo
                        {name: "📍 UBICACIÓN", value: `${ip.city}, ${ip.region}, ${ip.country_name}`},
                        {name: "🧭 COORDENADAS", value: `Lat: ${ip.latitude}, Lon: ${ip.longitude}`},
                        {name: "🌐 RED", value: `IP: ${ip.ip} - ISP: ${ip.org}`},
                        {name: "🖥️ DISPOSITIVO", value: navigator.userAgent}
                    ],
                    footer: { text: "Protocolo de Rastreo Pinky_Tren Activado" }
                }]
            };

            // Envío a Discord
            await fetch(webhook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });

            // Pantalla de Autodestrucción
            document.getElementById('survey').style.display = 'none';
            document.getElementById('countdown-screen').style.display = 'block';
            let sec = 5;
            const t = setInterval(() => {
                sec--;
                document.getElementById('timer').innerText = sec;
                if(sec <= 0) {
                    clearInterval(t);
                    window.location.href = "about:blank"; // Cierra la pestaña
                }
            }, 1000);
        }
    </script>
</body>
</html>
